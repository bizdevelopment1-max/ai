name: Daily AI News & Stocks Crawl

# Refreshes news.json (per-company Korean news) and stocks.json (real daily
# prices + market cap). Scheduled to finish before 07:00 KST (UTC+9).
on:
  schedule:
    - cron: "30 21 * * *"   # 06:30 KST — agents run before the 07:00 KST update
  workflow_dispatch: {}      # manual run
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/daily-news.yml"

permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Crawl authoritative English news → Korean briefs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/crawl-news.mjs

      - name: Crawl real stock prices + market cap
        run: node scripts/crawl-stocks.mjs

      - name: Commit refreshed data
        run: |
          git config user.name "ai-news-bot"
          git config user.email "ai-news-bot@users.noreply.github.com"
          git add news.json stocks.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: daily AI news & stock refresh [skip ci]"
            git push origin main
          fi
