name: Daily AI News & Stocks Crawl

# Refreshes news.json (per-company Korean news), stocks.json (real daily
# prices + market cap) and insights.json (rule-based toplines).
# Runs twice a day — morning & evening KST (UTC+9).
on:
  schedule:
    - cron: "30 21 * * *"   # 06:30 KST — 아침 업데이트(07:00 KST 이전 완료)
    - cron: "30 10 * * *"   # 19:30 KST — 저녁 업데이트
  workflow_dispatch: {}      # manual run
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/daily-news.yml"

permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Crawl authoritative English news → Korean briefs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/crawl-news.mjs

      - name: Crawl real stock prices + market cap
        run: node scripts/crawl-stocks.mjs

      - name: Generate AI Morning Briefing (Signal → Insight → Action)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-briefing.mjs

      - name: Generate Startup Radar + scorecards + monthly opportunity memo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/startup-radar.mjs

      - name: Build daily insights (rule-based, deterministic — no API key)
        run: node scripts/build-insights.mjs

      - name: Crawl IB research (증권사 1페이저 + 기관 피드)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/crawl-research.mjs

      - name: Build live company data (mentions + market caps)
        run: node scripts/crawl-companies.mjs

      - name: Audit agent — 전 산출물 감사(신선도·커버리지·엔진·금지어)
        run: node scripts/audit-agent.mjs

      - name: Commit refreshed data
        run: |
          git config user.name "ai-news-bot"
          git config user.email "ai-news-bot@users.noreply.github.com"
          git add news.json stocks.json insights.json briefing.json radar.json research.json companies.json audit.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: daily AI news & stock refresh [skip ci]"
            git push origin main
          fi
