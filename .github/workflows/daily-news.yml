name: Daily AI News Crawl

# Refreshes news.json from per-company crawler agents.
# Scheduled to finish before 07:00 KST (KST = UTC+9), so it runs at 21:30 UTC.
on:
  schedule:
    - cron: "30 21 * * *"   # 06:30 KST — agents run before the 07:00 KST update
  workflow_dispatch: {}      # allow manual runs

permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run crawler agents
        run: node scripts/crawl-news.mjs

      - name: Commit refreshed news.json
        run: |
          git config user.name "ai-news-bot"
          git config user.email "ai-news-bot@users.noreply.github.com"
          git add news.json
          if git diff --staged --quiet; then
            echo "No news changes."
          else
            git commit -m "chore: daily AI news refresh [skip ci]"
            git push origin main
          fi
