name: Daily AI News & Stocks Crawl

# Refreshes news.json (per-company Korean news), stocks.json (real daily
# prices + market cap) and insights.json (rule-based toplines).
# Runs twice a day — morning & evening KST (UTC+9).
on:
  schedule:
    - cron: "30 21 * * *"   # 06:30 KST — 아침 업데이트(07:00 KST 이전 완료)
    - cron: "30 3 * * *"    # 12:30 KST — 점심 업데이트
    - cron: "30 10 * * *"   # 19:30 KST — 저녁 업데이트
    - cron: "30 15 * * *"   # 00:30 KST — 심야 업데이트
  workflow_dispatch: {}      # manual run
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/daily-news.yml"

permissions:
  contents: write
  models: read     # GitHub Models — 별도 키 없이 GITHUB_TOKEN으로 LLM 호출

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 영어→한국어 요약·번역은 crawl-news.mjs 안에서 키 없는 GitHub Models로 수행(품질 양호).
      # (이전 로컬 opus-mt/m2m100 번역은 CPU에서 단어 샐러드 수준의 저품질 출력이라 비활성화)
      - name: Crawl authoritative English news → Korean briefs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/crawl-news.mjs

      - name: Crawl real stock prices + market cap
        run: node scripts/crawl-stocks.mjs

      - name: Generate AI Morning Briefing (Signal → Insight → Action)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-briefing.mjs

      - name: Generate Startup Radar + scorecards + monthly opportunity memo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/startup-radar.mjs

      - name: Build daily insights (rule-based, deterministic — no API key)
        run: node scripts/build-insights.mjs

      - name: Crawl IB research (증권사 1페이저 + 기관 피드)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/crawl-research.mjs

      - name: Build live company data (mentions + market caps)
        run: node scripts/crawl-companies.mjs

      - name: Crawl startup strategies (투자·협력 관점, 주간)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/crawl-startups.mjs

      - name: Refresh AI new-business market signals (주간)
        run: node scripts/crawl-markets.mjs

      - name: Accumulate AI infra & future-tech signals (기사 기반 누적)
        run: node scripts/crawl-infra.mjs

      - name: Accumulate AI monetization (business-model) signals (기사 기반 누적)
        run: node scripts/crawl-bizmodel.mjs

      - name: Audit agent — 전 산출물 감사(신선도·커버리지·엔진·금지어)
        run: node scripts/audit-agent.mjs

      - name: Commit refreshed data
        run: |
          git config user.name "ai-news-bot"
          git config user.email "ai-news-bot@users.noreply.github.com"
          git add news.json stocks.json insights.json briefing.json radar.json research.json companies.json startups.json market.json infra.json bizmodel.json audit.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: daily AI news & stock refresh [skip ci]"
            git push origin main
          fi
