name: Daily Ha Thai & AI News Update

# Updates Ha Thai article summary and adds latest related AI news to news.json
# Scheduled for 11:40 KST (02:40 UTC)
on:
  schedule:
    - cron: "40 2 * * *"    # 11:40 KST
  workflow_dispatch: {}      # manual run

permissions:
  contents: write

concurrency:
  group: daily-news-update
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      - name: Update Ha Thai article summary and add latest AI news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-ha-thai.mjs

      - name: Commit changes
        run: |
          git config user.name "ai-news-bot"
          git config user.email "ai-news-bot@users.noreply.github.com"
          git add news.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update Ha Thai article summary and add latest AI news [skip ci]"
            git push origin main
          fi
